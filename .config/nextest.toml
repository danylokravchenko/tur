[store]
dir = "target/nextest"

[profile.default]
retries = 0
fail-fast = false
slow-timeout = { period = "180s", terminate-after = 3 }

# Test threads - use all available cores
test-threads = "num-cpus"

# Status level for output
status-level = "pass"
final-status-level = "flaky"

# Show output for failed tests
failure-output = "immediate-final"
success-output = "never"

[profile.quick]
# Fast profile for quick local checks
retries = 0
fail-fast = true
test-threads = "num-cpus"
status-level = "skip"

# Override settings for specific tests
[[profile.default.overrides]]
filter = 'test(integration)'
threads-required = 1  # Serial execution for integration tests
slow-timeout = { period = "300s", terminate-after = 2 }  # Longer timeout for integration tests

# Test groups for better organization
[test-groups]
integration = { max-threads = 4 }
unit = { max-threads = "num-cpus" }
